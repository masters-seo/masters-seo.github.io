name: 🚀 Auto Blog Generator

on:
  schedule:
    - cron: '0 9 * * *' # Roda todos os dias às 09:00 UTC
  workflow_dispatch: # Permite execução manual


jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Obrigatório para o GitHub Actions conseguir fazer o git push

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests pillow youtube-transcript-api google-auth
      
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          COMPANY_NAME: "Masters SEO"
          COMPANY_WEBSITE: "https://masters-seo.github.io/"
          COMPANY_LOCATION: "Brasil"
          COMPANY_DESC: "Hub de análises independentes sobre os Experts do mercado de SEO"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python .github/scripts/orchestrator.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Garante que as pastas existem antes de tentar adicionar arquivos
          mkdir -p _posts/
          mkdir -p assets/img/posts/
          
          # Adiciona os arquivos se existirem
          git add _posts/*.md || true
          git add assets/img/posts/*.jpg || true
          
          # Faz o commit apenas se houver mudanças
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add auto-generated article and assets $(date +'%Y-%m-%d')" && git push)
