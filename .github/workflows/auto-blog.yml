name: 🚀 Auto Blog Generator

on:
  schedule:
    - cron: '0 19 * * *' 
  workflow_dispatch: 

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests pillow google-auth
      
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          COMPANY_NAME: "Masters SEO"
          COMPANY_WEBSITE: "https://masters-seo.github.io/"
        run: |
          python .github/scripts/generate_article.py
      
      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _posts/*.md || true
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "CHANGED=false" >> $GITHUB_ENV
            echo "Nenhum artigo novo foi gerado hoje."
          else
            git commit -m "Add auto-generated article $(date +'%Y-%m-%d')"
            git push
            echo "CHANGED=true" >> $GITHUB_ENV
            echo "Novo artigo commitado e enviado para o ar!"
          fi

      - name: Send Email Notification
        if: ${{ env.CHANGED == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: mayconmatosdigital@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🎉 Novo Artigo Publicado e Disponível na Home!"
          to: mayconmatosdigital@gmail.com
          from: "Robô Masters SEO <mayconmatosdigital@gmail.com>"
          secure: true
          body: |
            Publicado! Olá Maycon,
            
            O seu agente chefe de automação M. K. Hash, acabou de publicar um artigo inédito com sucesso no portal Masters SEO!
            
            O arquivo foi gerado, indexado no Google e a construção automática da página inicial (Home) foi disparada. Você já pode conferir a atualização diretamente no link principal.
            
            Abraços,
            Sua Automação GitHub Actions.
