name: 🚀 Auto Blog Generator

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # yt-dlp é a chave para contornar bloqueios do YouTube
          pip install google-genai requests pillow yt-dlp google-auth
      
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          COMPANY_NAME: "Masters SEO"
          COMPANY_WEBSITE: "https://masters-seo.github.io/"
          COMPANY_LOCATION: "Brasil"
          COMPANY_DESC: "Hub de análises independentes sobre os Experts do mercado de SEO"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          # Script movido para a pasta raiz 'scripts/' para evitar bloqueios do sistema
          python scripts/orchestrator.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          mkdir -p _posts/
          mkdir -p assets/img/posts/
          
          git add _posts/*.md || true
          git add assets/img/posts/*.jpg || true
          
          # Verifica se há algo para commitar
          if ! git diff --quiet --exit-code --cached; then
            git commit -m "Add auto-generated article and assets $(date +'%Y-%m-%d')"
            git push
          else
            echo "Nenhuma alteração para commitar."
          fi
