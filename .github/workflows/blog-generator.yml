name: 🚀 Auto Blog Generator

on:
  schedule:
    - cron: '0 9 * * *' # Roda todos os dias às 09:00 UTC
  workflow_dispatch: # Permite execução manual

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests
      
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMPANY_NAME: "Maycon M. Agência"
          COMPANY_WEBSITE: "mayconmatos.com.br"
          COMPANY_LOCATION: "Navegantes, SC - Brasil"
          COMPANY_DESC: "Consultoria de SEO e Marketing Digital especializada em SEO Local"
        run: |
          python .github/scripts/generate_article.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/blog/*.md || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add auto-generated article $(date +'%Y-%m-%d')" && git push)
