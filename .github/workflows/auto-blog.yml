name: 🚀 Auto Blog Generator

on:
  schedule:
    - cron: '0 9 * * *' # Roda todos os dias às 09:00 UTC
  workflow_dispatch: # Permite execução manual

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests pillow google-auth
      
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          COMPANY_NAME: "Masters SEO"
          COMPANY_WEBSITE: "https://masters-seo.github.io/"
        run: |
          python .github/scripts/generate_article.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _posts/*.md || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add auto-generated article $(date +'%Y-%m-%d')" && git push)
