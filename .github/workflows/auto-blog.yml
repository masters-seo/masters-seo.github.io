name: 🚀 Auto Blog Generator - YouTube

on:
  # Executa automaticamente todos os dias às 9:00 AM UTC (5:00 AM BRT)
  schedule:
    - cron: '0 9 * * *'
  
  # Permite execução manual
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forçar execução mesmo sem vídeos pendentes'
        required: false
        default: 'false'

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    # Permissões necessárias para fazer git push
    permissions:
      contents: write
      actions: read

    steps:
      # 1. Clonar repositório
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Criar pastas necessárias
      - name: 📁 Criar pastas
        run: |
          mkdir -p .github/scripts
          mkdir -p _posts
          mkdir -p assets/img/posts

      # 4. Instalar dependências
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests youtube-transcript-api -q

      # 5. Executar gerador de artigos
      - name: 🤖 Gerar artigo YouTube
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMPANY_NAME: "Masters SEO"
          COMPANY_WEBSITE: "https://masters-seo.github.io/"
        run: |
          python .github/scripts/orchestrator.py

      # 6. Configurar Git
      - name: ⚙️ Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"

      # 7. Commit e Push
      - name: 🔄 Commit e Push
        run: |
          # Verificar se há mudanças em _posts/
          if [ -n "$(git status _posts/ --porcelain)" ]; then
            echo "📝 Novos artigos detectados!"
            git add _posts/ || true
            git commit -m "🤖 Auto: Novo artigo gerado $(date +'%Y-%m-%d')"
            git push
            echo "✅ Artigo enviado com sucesso!"
          else
            echo "ℹ️ Nenhum artigo novo para enviá-lo."
          fi

      # 8. Resumo da execução
      - name: ✅ Resumo
        if: always()
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║   Auto Blog Generator - Execução Concluída"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "⏱️  Data/Hora: $(date)"
          echo "🎯 Status: ${{ job.status }}"
          echo ""
          if [ -d "_posts" ]; then
            echo "📊 Artigos em _posts/:"
            ls -1 _posts/ | head -5 || echo "   (nenhum)"
          fi
