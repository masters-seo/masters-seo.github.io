<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Generator IA - Painel de Controle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0066cc;
            --secondary: #00d4ff;
            --dark: #1a1a1a;
            --light: #f5f5f5;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #333;
            --border: #ddd;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #2d3748 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        header p {
            color: #666;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .grid.full {
            grid-template-columns: 1fr;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,102,204,0.3);
        }
        
        .btn-secondary {
            background: var(--secondary);
            color: #000;
        }
        
        .btn-secondary:hover {
            background: #00b8d4;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-danger {
            background: var(--error);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .keyword-item {
            background: var(--light);
            padding: 10px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 5px 5px 5px 0;
            font-size: 13px;
        }
        
        .keyword-item button {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            font-size: 16px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-info {
            background: #e0f2fe;
            color: #0369a1;
            border-left: 4px solid #0284c7;
        }
        
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #22c55e;
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #fbbf24;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-idle {
            background: #e5e7eb;
            color: #6b7280;
        }
        
        .status-running {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-success {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 25px;
        }
        
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .articles-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .article-item {
            background: var(--light);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        
        .article-info h3 {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .article-info p {
            font-size: 12px;
            color: #666;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 22px;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
        }
        
        .api-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .api-status-item {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
        }
        
        .api-status-item.ok {
            background: #dcfce7;
            color: #166534;
        }
        
        .api-status-item.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Blog Content AI Generator</h1>
            <p>Gerador automático de artigos de blog usando IA. Configure uma vez, gere artigos infinitos.</p>
        </header>
        
        <div class="grid">
            <!-- CONFIGURAÇÃO DA EMPRESA -->
            <div class="card">
                <h2>🏢 Dados da Empresa</h2>
                <div class="form-group">
                    <label>Nome da Empresa / Marca</label>
                    <input type="text" id="companyName" placeholder="Ex: Maycon M. Agência">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" id="companyWebsite" placeholder="Ex: mayconmatos.com.br">
                </div>
                <div class="form-group">
                    <label>Localização Principal</label>
                    <input type="text" id="companyLocation" placeholder="Ex: Navegantes, SC - Brasil">
                </div>
                <div class="form-group">
                    <label>Descrição da Empresa / Nicho</label>
                    <textarea id="companyDesc" placeholder="Descrição do seu negócio, serviços principais..."></textarea>
                </div>
                <div class="form-group">
                    <label>Público-Alvo</label>
                    <textarea id="targetAudience" placeholder="Ex: Pequenas empresas locais, prestadores de serviço, empreendedores..."></textarea>
                </div>
            </div>
            
            <!-- CONFIGURAÇÃO DE APIS -->
            <div class="card">
                <h2>🔑 Configuração de APIs</h2>
                
                <div class="tabs">
                    <button class="tab-btn active" data-tab="gemini">Gemini</button>
                    <button class="tab-btn" data-tab="claude">Claude</button>
                    <button class="tab-btn" data-tab="github">GitHub</button>
                </div>
                
                <div id="gemini" class="tab-content active">
                    <div class="form-group">
                        <label>Google Gemini API Key</label>
                        <input type="password" id="geminiKey" placeholder="cole sua chave Gemini aqui">
                        <small style="color: #666; margin-top: 5px; display: block;">
                            📌 <a href="https://aistudio.google.com/apikey" target="_blank">Obter chave gratuita</a>
                        </small>
                    </div>
                </div>
                
                <div id="claude" class="tab-content">
                    <div class="form-group">
                        <label>Anthropic Claude API Key</label>
                        <input type="password" id="claudeKey" placeholder="cole sua chave Claude aqui">
                        <small style="color: #666; margin-top: 5px; display: block;">
                            📌 <a href="https://console.anthropic.com/" target="_blank">Obter chave</a>
                        </small>
                    </div>
                </div>
                
                <div id="github" class="tab-content">
                    <div class="form-group">
                        <label>GitHub Token (Personal Access)</label>
                        <input type="password" id="githubToken" placeholder="token GitHub para publicação">
                        <small style="color: #666; margin-top: 5px; display: block;">
                            📌 <a href="https://github.com/settings/tokens" target="_blank">Gerar token</a> com permissão `repo`
                        </small>
                    </div>
                    <div class="form-group">
                        <label>GitHub Repositório (owner/repo)</label>
                        <input type="text" id="githubRepo" placeholder="Ex: seu-usuario/seu-blog">
                    </div>
                    <div class="form-group">
                        <label>Branch Padrão</label>
                        <input type="text" id="githubBranch" placeholder="main" value="main">
                    </div>
                    <div class="form-group">
                        <label>Pasta de Posts (no repo)</label>
                        <input type="text" id="githubFolder" placeholder="Ex: content/blog ou posts">
                    </div>
                </div>
                
                <button class="btn btn-primary" style="width: 100%;" onclick="testAPIs()">
                    🧪 Testar Conexões
                </button>
                
                <div id="apiStatus" class="api-status" style="display: none; margin-top: 20px;"></div>
            </div>
        </div>
        
        <!-- CONFIGURAÇÃO DE CONTEÚDO -->
        <div class="card full">
            <h2>📝 Estratégia de Conteúdo</h2>
            
            <div class="grid">
                <div>
                    <div class="form-group">
                        <label>Tópicos Principais (um por linha)</label>
                        <textarea id="mainTopics" placeholder="Como aparecer no Google Maps
SEO local para pequenas empresas
Criar site que converte clientes
Otimização para inteligência artificial
Estratégias de SEO para negócios locais"></textarea>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Palavras-Chave Alvo (uma por linha)</label>
                        <textarea id="keywords" placeholder="consultor de seo
consultoria de seo
seo local
google maps otimização
site de conversão"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="grid">
                <div>
                    <div class="form-group">
                        <label>Tom de Voz / Estilo</label>
                        <select id="tone">
                            <option value="profissional">Profissional e Confiável</option>
                            <option value="amigavel">Amigável e Acessível</option>
                            <option value="tecnico">Técnico e Detalhado</option>
                            <option value="conversacional">Conversacional e Informal</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Formato Padrão de Artigo</label>
                        <select id="format">
                            <option value="pilar">Artigo Pilar (2000-3000 palavras)</option>
                            <option value="guia">Guia Prático (1500-2000 palavras)</option>
                            <option value="rapido">Post Rápido (500-800 palavras)</option>
                            <option value="faq">FAQ com Perguntas</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>CTA (Call-to-Action) Padrão</label>
                <input type="text" id="cta" placeholder="Ex: Agende sua consultoria gratuita - clique aqui">
            </div>
            
            <button class="btn btn-success" style="width: 100%; padding: 15px; font-size: 16px;" onclick="saveConfig()">
                💾 Salvar Configurações
            </button>
        </div>
        
        <!-- GERAÇÃO DE ARTIGOS -->
        <div class="card full">
            <h2>⚡ Gerador de Artigos</h2>
            
            <div class="alert alert-info">
                ℹ️ Aqui você pode gerar artigos individuais. Para automação contínua, use o Google Apps Script.
            </div>
            
            <div class="grid">
                <div>
                    <div class="form-group">
                        <label>Selecione um Tópico</label>
                        <select id="selectedTopic">
                            <option value="">-- Carregando tópicos --</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Selecione uma Palavra-Chave</label>
                        <select id="selectedKeyword">
                            <option value="">-- Carregando palavras-chave --</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Instruções Adicionais (opcional)</label>
                <textarea id="extraInstructions" placeholder="Ex: Foque em XYZ, não esqueça de mencionar ABC..."></textarea>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateArticle('gemini')">
                    ✨ Gerar com Gemini
                </button>
                <button class="btn btn-primary" onclick="generateArticle('claude')">
                    ✨ Gerar com Claude
                </button>
                <button class="btn btn-secondary" onclick="showPreview()">
                    👁️ Visualizar Template
                </button>
            </div>
            
            <div id="generationStatus" style="display: none; margin-top: 20px;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="statusText" style="font-size: 14px; color: #666; margin-top: 10px;"></p>
            </div>
            
            <div id="generatedContent" style="display: none; margin-top: 20px; padding: 20px; background: var(--light); border-radius: 6px; max-height: 600px; overflow-y: auto;">
                <h3 style="margin-bottom: 15px;">📄 Conteúdo Gerado</h3>
                <pre id="contentDisplay" style="font-family: 'Courier New', monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word;"></pre>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn btn-success" onclick="publishToGitHub()">
                        🚀 Publicar no GitHub
                    </button>
                    <button class="btn btn-secondary" onclick="copyToClipboard()">
                        📋 Copiar Markdown
                    </button>
                </div>
            </div>
        </div>
        
        <!-- HISTÓRICO E STATUS -->
        <div class="card full">
            <h2>📊 Histórico de Artigos</h2>
            
            <div id="articlesList" class="articles-list">
                <p style="color: #999; text-align: center; padding: 30px;">Nenhum artigo gerado ainda...</p>
            </div>
        </div>
    </div>
    
    <script>
        // ===== ESTADO GLOBAL =====
        const state = {
            config: {},
            generatedContent: '',
            articles: []
        };
        
        // ===== INICIALIZAR =====
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            setupTabs();
            loadArticles();
            updateTopicKeywordSelects();
        });
        
        // ===== TABS =====
        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tab).classList.add('active');
                });
            });
        }
        
        // ===== SALVAR CONFIG =====
        function saveConfig() {
            state.config = {
                company: {
                    name: document.getElementById('companyName').value,
                    website: document.getElementById('companyWebsite').value,
                    location: document.getElementById('companyLocation').value,
                    description: document.getElementById('companyDesc').value,
                    targetAudience: document.getElementById('targetAudience').value
                },
                apis: {
                    gemini: document.getElementById('geminiKey').value,
                    claude: document.getElementById('claudeKey').value,
                    github: {
                        token: document.getElementById('githubToken').value,
                        repo: document.getElementById('githubRepo').value,
                        branch: document.getElementById('githubBranch').value,
                        folder: document.getElementById('githubFolder').value
                    }
                },
                content: {
                    topics: document.getElementById('mainTopics').value.split('\n').filter(t => t.trim()),
                    keywords: document.getElementById('keywords').value.split('\n').filter(k => k.trim()),
                    tone: document.getElementById('tone').value,
                    format: document.getElementById('format').value,
                    cta: document.getElementById('cta').value
                }
            };
            
            localStorage.setItem('blogGeneratorConfig', JSON.stringify(state.config));
            showAlert('✅ Configurações salvas com sucesso!', 'success');
            updateTopicKeywordSelects();
        }
        
        // ===== CARREGAR CONFIG =====
        function loadConfig() {
            const saved = localStorage.getItem('blogGeneratorConfig');
            if (saved) {
                state.config = JSON.parse(saved);
                
                // Restaurar campos
                document.getElementById('companyName').value = state.config.company?.name || '';
                document.getElementById('companyWebsite').value = state.config.company?.website || '';
                document.getElementById('companyLocation').value = state.config.company?.location || '';
                document.getElementById('companyDesc').value = state.config.company?.description || '';
                document.getElementById('targetAudience').value = state.config.company?.targetAudience || '';
                
                document.getElementById('geminiKey').value = state.config.apis?.gemini || '';
                document.getElementById('claudeKey').value = state.config.apis?.claude || '';
                document.getElementById('githubToken').value = state.config.apis?.github?.token || '';
                document.getElementById('githubRepo').value = state.config.apis?.github?.repo || '';
                document.getElementById('githubBranch').value = state.config.apis?.github?.branch || 'main';
                document.getElementById('githubFolder').value = state.config.apis?.github?.folder || '';
                
                document.getElementById('mainTopics').value = (state.config.content?.topics || []).join('\n');
                document.getElementById('keywords').value = (state.config.content?.keywords || []).join('\n');
                document.getElementById('tone').value = state.config.content?.tone || 'profissional';
                document.getElementById('format').value = state.config.content?.format || 'pilar';
                document.getElementById('cta').value = state.config.content?.cta || '';
            }
        }
        
        // ===== ATUALIZAR SELECTS =====
        function updateTopicKeywordSelects() {
            const topics = state.config.content?.topics || [];
            const keywords = state.config.content?.keywords || [];
            
            const topicSelect = document.getElementById('selectedTopic');
            const keywordSelect = document.getElementById('selectedKeyword');
            
            topicSelect.innerHTML = '<option value="">-- Selecione um tópico --</option>';
            keywordSelect.innerHTML = '<option value="">-- Selecione uma palavra-chave --</option>';
            
            topics.forEach(topic => {
                if (topic.trim()) {
                    const option = document.createElement('option');
                    option.value = topic;
                    option.textContent = topic;
                    topicSelect.appendChild(option);
                }
            });
            
            keywords.forEach(keyword => {
                if (keyword.trim()) {
                    const option = document.createElement('option');
                    option.value = keyword;
                    option.textContent = keyword;
                    keywordSelect.appendChild(option);
                }
            });
        }
        
        // ===== TESTAR APIs =====
        async function testAPIs() {
            const statusDiv = document.getElementById('apiStatus');
            statusDiv.style.display = 'grid';
            statusDiv.innerHTML = '';
            
            const tests = [
                { name: 'Gemini', key: document.getElementById('geminiKey').value, type: 'gemini' },
                { name: 'Claude', key: document.getElementById('claudeKey').value, type: 'claude' },
                { name: 'GitHub', key: document.getElementById('githubToken').value, type: 'github' }
            ];
            
            for (const test of tests) {
                const item = document.createElement('div');
                item.className = 'api-status-item';
                item.innerHTML = '<div class="loading"></div> Testando...';
                statusDiv.appendChild(item);
                
                try {
                    let result = false;
                    
                    if (test.type === 'gemini' && test.key) {
                        // Teste Gemini
                        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' + test.key, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: 'test' }] }] })
                        });
                        result = res.ok || res.status === 400;
                    } else if (test.type === 'claude' && test.key) {
                        // Teste Claude
                        const res = await fetch('https://api.anthropic.com/v1/messages', {
                            method: 'POST',
                            headers: {
                                'x-api-key': test.key,
                                'Content-Type': 'application/json',
                                'anthropic-version': '2023-06-01'
                            },
                            body: JSON.stringify({ model: 'claude-opus-4-1', max_tokens: 10, messages: [{ role: 'user', content: 'test' }] })
                        });
                        result = res.ok;
                    } else if (test.type === 'github' && test.key) {
                        // Teste GitHub
                        const res = await fetch('https://api.github.com/user', {
                            headers: { 'Authorization': 'token ' + test.key }
                        });
                        result = res.ok;
                    }
                    
                    item.className = 'api-status-item ' + (result || !test.key ? 'ok' : 'error');
                    item.innerHTML = test.key ? (result ? '✅ ' + test.name : '❌ ' + test.name) : '⏭️ ' + test.name;
                } catch (e) {
                    item.className = 'api-status-item error';
                    item.innerHTML = '❌ ' + test.name;
                }
            }
        }
        
        // ===== GERAR ARTIGO =====
        async function generateArticle(source) {
            const topic = document.getElementById('selectedTopic').value;
            const keyword = document.getElementById('selectedKeyword').value;
            const extraInstructions = document.getElementById('extraInstructions').value;
            
            if (!topic || !keyword) {
                showAlert('❌ Selecione um tópico e uma palavra-chave!', 'error');
                return;
            }
            
            if (!state.config.apis?.gemini && source === 'gemini') {
                showAlert('❌ Configure a chave Gemini!', 'error');
                return;
            }
            
            if (!state.config.apis?.claude && source === 'claude') {
                showAlert('❌ Configure a chave Claude!', 'error');
                return;
            }
            
            // Mostrar progresso
            document.getElementById('generationStatus').style.display = 'block';
            document.getElementById('generatedContent').style.display = 'none';
            
            try {
                const prompt = buildPrompt(topic, keyword, extraInstructions);
                let content = '';
                
                if (source === 'gemini') {
                    content = await generateWithGemini(prompt);
                } else {
                    content = await generateWithClaude(prompt);
                }
                
                state.generatedContent = content;
                document.getElementById('contentDisplay').textContent = content;
                document.getElementById('generatedContent').style.display = 'block';
                document.getElementById('generationStatus').style.display = 'none';
                
                showAlert('✅ Artigo gerado com sucesso!', 'success');
                
            } catch (error) {
                document.getElementById('generationStatus').style.display = 'none';
                showAlert('❌ Erro ao gerar: ' + error.message, 'error');
            }
        }
        
        // ===== BUILD PROMPT =====
        function buildPrompt(topic, keyword, extra) {
            const config = state.config;
            
            return `Você é um especialista em SEO e criação de conteúdo de alta qualidade.

DADOS DA EMPRESA:
- Nome: ${config.company?.name}
- Website: ${config.company?.website}
- Localização: ${config.company?.location}
- Descrição: ${config.company?.description}
- Público-alvo: ${config.company?.targetAudience}

TAREFA:
Crie um artigo de blog ${config.content?.format || 'pilar'} otimizado para SEO.

TÓPICO: ${topic}
PALAVRA-CHAVE PRINCIPAL: ${keyword}
TOM: ${config.content?.tone}
CTA: ${config.content?.cta}

INSTRUÇÕES ADICIONAIS:
${extra || 'Siga as melhores práticas de SEO'}

ESTRUTURA OBRIGATÓRIA:
1. Título SEO (≤60 caracteres)
2. Meta Description (≤155 caracteres)
3. Slug amigável
4. Resumo Rápido (box destacado)
5. Introdução com CTA
6. H2 com 3-4 H3 cada
7. Conclusão + CTA
8. 5-7 perguntas FAQ
9. Schema JSON-LD sugerido

REGRAS:
- Linguagem natural, sem keyword stuffing
- Parágrafos curtos e escaneáveis
- Incluir exemplos práticos
- Links internos (sugeridos)
- Otimizado para featured snippets
- Foco em E-E-A-T (YMYL)

Gere o artigo em Markdown pronto para publicação.`;
        }
        
        // ===== GERAR COM GEMINI =====
        async function generateWithGemini(prompt) {
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=' + state.config.apis.gemini, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }],
                    generationConfig: {
                        maxOutputTokens: 4000,
                        temperature: 0.7
                    }
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Erro na API Gemini');
            }
            
            const data = await response.json();
            return data.candidates[0]?.content?.parts[0]?.text || '';
        }
        
        // ===== GERAR COM CLAUDE =====
        async function generateWithClaude(prompt) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': state.config.apis.claude,
                    'Content-Type': 'application/json',
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-opus-4-1',
                    max_tokens: 4000,
                    messages: [{
                        role: 'user',
                        content: prompt
                    }]
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Erro na API Claude');
            }
            
            const data = await response.json();
            return data.content[0]?.text || '';
        }
        
        // ===== PUBLICAR NO GITHUB =====
        async function publishToGitHub() {
            if (!state.generatedContent) {
                showAlert('❌ Nenhum conteúdo para publicar!', 'error');
                return;
            }
            
            const token = state.config.apis?.github?.token;
            const repo = state.config.apis?.github?.repo;
            const branch = state.config.apis?.github?.branch || 'main';
            const folder = state.config.apis?.github?.folder || 'posts';
            
            if (!token || !repo) {
                showAlert('❌ Configure GitHub Token e Repositório!', 'error');
                return;
            }
            
            try {
                // Extrair título do conteúdo
                const titleMatch = state.generatedContent.match(/^#\s+(.+)/m);
                const title = titleMatch ? titleMatch[1].trim() : 'artigo-' + Date.now();
                const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 50);
                const filename = `${slug}.md`;
                const path = `${folder}/${filename}`;
                
                // Preparar conteúdo com metadados
                const content = `---
title: "${title}"
date: ${new Date().toISOString()}
slug: "${slug}"
---

${state.generatedContent}`;
                
                const [owner, repoName] = repo.split('/');
                
                // Fazer upload via GitHub API
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add article: ${title}`,
                        content: btoa(content),
                        branch: branch
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Erro ao fazer upload');
                }
                
                showAlert('✅ Artigo publicado no GitHub!', 'success');
                
                // Adicionar ao histórico
                addArticleToHistory({
                    title,
                    slug,
                    path,
                    date: new Date().toLocaleString('pt-BR'),
                    status: 'Publicado'
                });
                
            } catch (error) {
                showAlert('❌ Erro ao publicar: ' + error.message, 'error');
            }
        }
        
        // ===== HISTÓRICO =====
        function addArticleToHistory(article) {
            state.articles.unshift(article);
            localStorage.setItem('generatedArticles', JSON.stringify(state.articles));
            loadArticles();
        }
        
        function loadArticles() {
            const saved = localStorage.getItem('generatedArticles');
            state.articles = saved ? JSON.parse(saved) : [];
            updateArticlesList();
        }
        
        function updateArticlesList() {
            const list = document.getElementById('articlesList');
            
            if (state.articles.length === 0) {
                list.innerHTML = '<p style="color: #999; text-align: center; padding: 30px;">Nenhum artigo gerado ainda...</p>';
                return;
            }
            
            list.innerHTML = state.articles.map((article, idx) => `
                <div class="article-item">
                    <div class="article-info">
                        <h3>${article.title}</h3>
                        <p>📅 ${article.date}</p>
                        <p>📂 ${article.path}</p>
                    </div>
                    <span class="status-badge status-success">${article.status}</span>
                </div>
            `).join('');
        }
        
        // ===== UTILIDADES =====
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.querySelector('header').after(alert);
            setTimeout(() => alert.remove(), 5000);
        }
        
        function copyToClipboard() {
            navigator.clipboard.writeText(state.generatedContent);
            showAlert('✅ Copiado para área de transferência!', 'success');
        }
        
        function showPreview() {
            alert('Template carregado - veja o artigo gerado acima.');
        }
    </script>
</body>
</html>
