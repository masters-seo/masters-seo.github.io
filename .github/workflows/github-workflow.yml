name: 🚀 Auto Blog Generator

# Quando rodar?
on:
  # Todos os dias às 9:00 AM (UTC)
  schedule:
    - cron: '0 9 * * *'
  
  # Também permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Fazer checkout do repositório
      - name: Checkout repo
        uses: actions/checkout@v3
      
      # 2. Setup Python (para executar o script de geração)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # 3. Instalar dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai anthropic requests
      
      # 4. Executar script de geração
      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          COMPANY_NAME: "Maycon M. Agência"
          COMPANY_WEBSITE: "mayconmatos.com.br"
          COMPANY_LOCATION: "Navegantes, SC - Brasil"
          COMPANY_DESC: "Consultoria de SEO e Marketing Digital especializada em SEO Local"
        run: |
          python .github/scripts/generate_article.py
      
      # 5. Commit e push
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/blog/*.md || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add auto-generated article $(date +'%Y-%m-%d')" && git push)
